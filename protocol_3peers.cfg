SPECIFICATION Spec
CONSTANT defaultInitValue = defaultInitValue

CONSTANT peer1 = peer1
CONSTANT peer2 = peer2
CONSTANT peer3 = peer3
CONSTANT InitialPeers = {peer1, peer2, peer3}
CONSTANT MaxBlock = 2
CONSTANT MaxClock = 5
CONSTANT DisconnectTimeout = 4
CONSTANT MinPeerProtoVersion = 170002

\* Symmetry reduction collapses states that are identical up to a renaming of peers,
\* cutting the state space by up to N! (6x for 3 peers). Peers must be declared as
\* model values (not strings) for this to work -- see README for details.
\* NOTE: symmetry is sound for safety but can miss liveness counterexamples (TLC
\* limitation), so this config is a bounded stress test only. The 2-peer config
\* (protocol.cfg) gives the complete liveness proof.
SYMMETRY Symmetry

CHECK_DEADLOCK FALSE

PROPERTY AllSynced

INVARIANT InvCountBounded
INVARIANT GetDataCountBounded
INVARIANT HeadersCountBounded
INVARIANT VersionBounded
INVARIANT PingOnEstablished
INVARIANT SyncDirection
