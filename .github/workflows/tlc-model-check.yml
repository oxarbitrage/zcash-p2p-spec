name: TLA+ Model Checking

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  model_check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Download TLC tools
      run: wget https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar

    - name: Run TLC model checker
      run: |
        timeout 120 java -jar tla2tools.jar -config protocol.cfg protocol.tla || true
