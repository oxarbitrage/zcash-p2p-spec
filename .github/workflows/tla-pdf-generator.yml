name: TLA+ PDF Generation

on:
  push:
    branches:
      - main
    paths:
      - 'protocol.tla'
      - 'messages.tla'
  workflow_dispatch:

jobs:
  generate_pdfs:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        persist-credentials: true

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Install LaTeX and Ghostscript
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended ghostscript

    - name: Download TLA+ Tools
      run: |
        wget https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar

    - name: Generate PDFs for TLA+ files
      run: |
        java -cp tla2tools.jar tla2tex.TLA -shade -noPcalShade protocol.tla
        ps2pdf protocol.ps protocol.pdf
        java -cp tla2tools.jar tla2tex.TLA -shade -noPcalShade messages.tla
        ps2pdf messages.ps messages.pdf

    - name: Move PDFs to documents folder
      run: mv -f protocol.pdf messages.pdf documents/

    - name: Push documents
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        file_pattern: 'documents/*.pdf'
        commit_message: 'Add generated PDFs to documents directory'

